<!-- Wealet — pantalla: categorias
     Referencia de diseño extraída de Wealet.dc.html (solo esta pantalla).
     Trabaja SOLO esta pantalla en Claude Code; no abras el .dc.html completo.
     Sintaxis del prototipo: {{ x }} = interpolación, <sc-if>/<sc-for> = condicional/loop.
     Los tokens de color/tipografía viven en el <style> de abajo. -->
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'Geist',system-ui,-apple-system,sans-serif;background:#F6F8FB;color:#12294A;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:rgba(100,116,139,.28);border-radius:8px;border:3px solid transparent;background-clip:padding-box}
  :root{
    --bg:#F6F8FB;--card:#FFFFFF;--card-2:#F1F5FA;--tint:#F3F8FE;--border:#E6EBF2;--border-strong:#D6DEEA;
    --text:#12294A;--muted:#64748B;--navy:#12294A;
    --pos:#037940;--pos-bg:#E7F4EC;--neg:#DC2626;--neg-bg:#FBEAEA;--warn:#D97706;--warn-bg:#FBF1E1;--info:#2563EB;--info-bg:#E9F0FE;
    --disp:#16A89A;--disp-bg:#E3F5F2;--res:#2563EB;--res-bg:#E9F0FE;--comp:#D97706;--comp-bg:#FBF1E1;
    --grad:linear-gradient(120deg,#1FA9E0 0%,#16A89A 52%,#6BBF3F 100%);
    --shadow:0 1px 2px rgba(18,41,74,.05),0 1px 3px rgba(18,41,74,.04);
    --shadow-lg:0 8px 30px rgba(18,41,74,.10),0 2px 8px rgba(18,41,74,.06);
    --field:#FFFFFF;
  }
  [data-theme="dark"]{
    --bg:#0F2240;--card:#1A2F52;--card-2:#16294A;--tint:#16314F;--border:rgba(255,255,255,.08);--border-strong:rgba(255,255,255,.15);
    --text:#E6ECF5;--muted:#93A4C0;--navy:#0F2240;
    --pos:#34D17E;--pos-bg:rgba(52,209,126,.13);--neg:#F87171;--neg-bg:rgba(248,113,113,.13);--warn:#FBBF24;--warn-bg:rgba(251,191,36,.13);--info:#60A5FA;--info-bg:rgba(96,165,250,.13);
    --disp:#2DD4BF;--disp-bg:rgba(45,212,191,.13);--res:#60A5FA;--res-bg:rgba(96,165,250,.13);--comp:#FBBF24;--comp-bg:rgba(251,191,36,.13);
    --shadow:0 1px 2px rgba(0,0,0,.24),0 1px 3px rgba(0,0,0,.18);
    --shadow-lg:0 12px 36px rgba(0,0,0,.34),0 3px 10px rgba(0,0,0,.24);
    --field:#16294A;
  }
  @keyframes wl-shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
  @keyframes wl-up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes wl-pop{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:none}}
  @keyframes wl-fade{from{opacity:0}to{opacity:1}}
</style>
<div data-theme="light" style="background:var(--bg);color:var(--text);font-family:'Geist',system-ui,sans-serif;padding:16px">
<sc-if value="{{ show.categorias }}" hint-placeholder-val="{{ false }}">
          <div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
              <div style="font-size:13.5px;color:var(--muted)">Las categorías son una dimensión de análisis del gasto — no reemplazan a los fondos.</div>
              <button style="display:flex;align-items:center;gap:7px;height:36px;padding:0 14px;border:none;border-radius:9px;background:var(--grad);color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;box-shadow:var(--shadow);flex:none">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"></path></svg>Nueva categoría
              </button>
            </div>

            <!-- editing row example with palette -->
            <div style="background:var(--card);border:1px solid var(--info);border-radius:12px;box-shadow:var(--shadow);padding:16px 18px;margin-bottom:22px">
              <div style="display:flex;align-items:center;gap:12px">
                <span style="width:38px;height:38px;border-radius:10px;flex:none;background:var(--disp)"></span>
                <input value="Alimentación" style="flex:1;border:1px solid var(--border);border-radius:8px;background:var(--field);height:40px;padding:0 12px;font-family:inherit;font-size:14px;font-weight:500;color:var(--text);outline:none">
                <button style="height:40px;padding:0 16px;border:none;border-radius:8px;background:var(--grad);color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer">Guardar</button>
              </div>
              <div style="display:flex;align-items:center;gap:9px;margin-top:14px">
                <span style="font-size:12px;color:var(--muted);margin-right:4px">Color</span>
                <sc-for list="{{ palette }}" as="p" hint-placeholder-count="10">
                  <span style="width:24px;height:24px;border-radius:7px;cursor:pointer;background:{{ p.c }};box-shadow:0 0 0 2px var(--card),0 0 0 {{ p.ring }} {{ p.c }}"></span>
                </sc-for>
              </div>
            </div>

            <div style="font-size:13px;font-weight:600;color:var(--muted);margin-bottom:12px">Gastos · 8</div>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;margin-bottom:26px">
              <sc-for list="{{ catGasto }}" as="c" hint-placeholder-count="8">
                <div style="display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);padding:14px 16px;cursor:pointer;transition:border-color .15s" style-hover="border-color:var(--border-strong)">
                  <span style="width:34px;height:34px;border-radius:9px;flex:none;background:{{ c.color }}"></span>
                  <div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:600">{{ c.n }}</div><div style="font-size:12px;color:var(--muted)">{{ c.mov }} en junio</div></div>
                  <div style="font-size:13px;font-weight:600;font-variant-numeric:tabular-nums">{{ c.t }}</div>
                </div>
              </sc-for>
            </div>

            <div style="font-size:13px;font-weight:600;color:var(--muted);margin-bottom:12px">Ingresos · 3</div>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px">
              <sc-for list="{{ catIngreso }}" as="c" hint-placeholder-count="3">
                <div style="display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);padding:14px 16px;cursor:pointer;transition:border-color .15s" style-hover="border-color:var(--border-strong)">
                  <span style="width:34px;height:34px;border-radius:9px;flex:none;background:{{ c.color }}"></span>
                  <div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:600">{{ c.n }}</div><div style="font-size:12px;color:var(--muted)">{{ c.mov }} en junio</div></div>
                  <div style="font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--pos)">{{ c.t }}</div>
                </div>
              </sc-for>
            </div>
          </div>
          </sc-if>
</div>
