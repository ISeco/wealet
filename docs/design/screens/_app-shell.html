<!-- Wealet — APP SHELL (sidebar + topbar)
     El "chrome" compartido que envuelve a TODAS las pantallas in-app:
     dashboard, fondos, transacciones, transferencias, salud, categorias, import, settings, design-system.
     Cada archivo de pantalla de esta carpeta contiene SOLO el contenido que va dentro de
     <main> → content (el <div> con max-width:1180px). NO repiten el sidebar/topbar: se insertan acá.
     auth.html y onboarding.html NO usan este shell (son full-screen, fuera de show.app).
     En React: AppLayout = <Sidebar/> + <TopBar/> + <Outlet/> (el contenido por ruta).
     Tokens de color/tipografía en el <style> de abajo. -->
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'Geist',system-ui,-apple-system,sans-serif;background:#F6F8FB;color:#12294A;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  :root{
    --bg:#F6F8FB;--card:#FFFFFF;--card-2:#F1F5FA;--tint:#F3F8FE;--border:#E6EBF2;--border-strong:#D6DEEA;
    --text:#12294A;--muted:#64748B;--navy:#12294A;
    --pos:#037940;--pos-bg:#E7F4EC;--neg:#DC2626;--neg-bg:#FBEAEA;--warn:#D97706;--warn-bg:#FBF1E1;--info:#2563EB;--info-bg:#E9F0FE;
    --disp:#16A89A;--disp-bg:#E3F5F2;--res:#2563EB;--res-bg:#E9F0FE;--comp:#D97706;--comp-bg:#FBF1E1;
    --grad:linear-gradient(120deg,#1FA9E0 0%,#16A89A 52%,#6BBF3F 100%);
    --shadow:0 1px 2px rgba(18,41,74,.05),0 1px 3px rgba(18,41,74,.04);
    --shadow-lg:0 8px 30px rgba(18,41,74,.10),0 2px 8px rgba(18,41,74,.06);
    --field:#FFFFFF;
  }
  [data-theme="dark"]{
    --bg:#0F2240;--card:#1A2F52;--card-2:#16294A;--tint:#16314F;--border:rgba(255,255,255,.08);--border-strong:rgba(255,255,255,.15);
    --text:#E6ECF5;--muted:#93A4C0;--navy:#0F2240;
    --pos:#34D17E;--pos-bg:rgba(52,209,126,.13);--neg:#F87171;--neg-bg:rgba(248,113,113,.13);--warn:#FBBF24;--warn-bg:rgba(251,191,36,.13);--info:#60A5FA;--info-bg:rgba(96,165,250,.13);
    --disp:#2DD4BF;--disp-bg:rgba(45,212,191,.13);--res:#60A5FA;--res-bg:rgba(96,165,250,.13);--comp:#FBBF24;--comp-bg:rgba(251,191,36,.13);
    --shadow:0 1px 2px rgba(0,0,0,.24),0 1px 3px rgba(0,0,0,.18);
    --shadow-lg:0 12px 36px rgba(0,0,0,.34),0 3px 10px rgba(0,0,0,.24);
    --field:#16294A;
  }
</style>
<div data-theme="light" style="background:var(--bg);color:var(--text);font-family:'Geist',system-ui,sans-serif">
  <div style="display:flex;min-height:100vh">

    <!-- ===== SIDEBAR (252px) ===== -->
    <aside style="width:252px;flex:none;border-right:1px solid var(--border);background:var(--card);display:flex;flex-direction:column;position:sticky;top:0;height:100vh">
      <!-- brand -->
      <div style="display:flex;align-items:center;gap:11px;padding:20px 20px 18px">
        <div style="width:36px;height:36px;flex:none">{{ logoSidebar }}</div>
        <div style="font-weight:600;font-size:18px;letter-spacing:-.02em;color:var(--text)">Wealet</div>
      </div>

      <!-- nav (data-driven: navMain + navSys desde la lógica) -->
      <nav style="display:flex;flex-direction:column;gap:2px;padding:6px 12px;flex:1;overflow-y:auto">
        <div style="font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);padding:12px 12px 6px;opacity:.8">General</div>
        <!-- navMain: Dashboard, Fondos, Transacciones, Transferencias, Salud financiera, Categorías -->
        <sc-for list="{{ navMain }}" as="it" hint-placeholder-count="6">
          <div onClick="{{ it.go }}" style="display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;cursor:pointer;font-size:13.5px;position:relative;color:var(--muted);transition:background .15s,color .15s;font-weight:{{ it.fw }};background:{{ it.bg }};color:{{ it.color }}" style-hover="background:var(--card-2)">
            <span style="position:absolute;left:-12px;top:50%;transform:translateY(-50%);width:3px;height:18px;border-radius:0 3px 3px 0;background:var(--grad);opacity:{{ it.bar }}"></span>
            <span style="width:18px;height:18px;display:flex;flex:none" data-icon="{{ it.key }}">{{ it.icon }}</span>
            <span>{{ it.label }}</span>
          </div>
        </sc-for>
        <div style="font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);padding:16px 12px 6px;opacity:.8">Sistema</div>
        <!-- navSys: Importar Excel, Design System, Ajustes -->
        <sc-for list="{{ navSys }}" as="it" hint-placeholder-count="3">
          <div onClick="{{ it.go }}" style="display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;cursor:pointer;font-size:13.5px;position:relative;color:var(--muted);transition:background .15s,color .15s;font-weight:{{ it.fw }};background:{{ it.bg }};color:{{ it.color }}" style-hover="background:var(--card-2)">
            <span style="position:absolute;left:-12px;top:50%;transform:translateY(-50%);width:3px;height:18px;border-radius:0 3px 3px 0;background:var(--grad);opacity:{{ it.bar }}"></span>
            <span style="width:18px;height:18px;display:flex;flex:none">{{ it.icon }}</span>
            <span>{{ it.label }}</span>
          </div>
        </sc-for>
      </nav>

      <!-- user (click → settings) -->
      <div style="border-top:1px solid var(--border);padding:12px">
        <div onClick="{{ go.settings }}" style="display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;cursor:pointer" style-hover="background:var(--card-2)">
          <div style="width:32px;height:32px;border-radius:50%;flex:none;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:13px">IV</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Ignacio Vergara</div>
            <div style="font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">ignacio@wealet.cl</div>
          </div>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>
      </div>
    </aside>

    <!-- ===== MAIN ===== -->
    <main style="flex:1;min-width:0;display:flex;flex-direction:column">
      <!-- TOPBAR (breadcrumb + título + buscador ⌘K + toggle de tema; sticky, con blur) -->
      <header style="display:flex;align-items:center;gap:16px;padding:16px 32px;border-bottom:1px solid var(--border);background:color-mix(in srgb,var(--bg) 70%,transparent);backdrop-filter:blur(8px);position:sticky;top:0;z-index:20">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;color:var(--muted);font-weight:500">{{ crumb }}</div>
          <div style="font-size:20px;font-weight:600;letter-spacing:-.02em;color:var(--text);margin-top:1px">{{ pageTitle }}</div>
        </div>
        <button onClick="{{ openQuick }}" style="display:flex;align-items:center;gap:10px;height:38px;padding:0 12px 0 12px;border:1px solid var(--border);border-radius:9px;background:var(--card);color:var(--muted);font-family:inherit;font-size:13px;cursor:pointer;transition:border-color .15s" style-hover="border-color:var(--border-strong)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <span style="min-width:120px;text-align:left">Buscar o crear…</span>
          <span style="font-family:'Geist Mono',monospace;font-size:11px;border:1px solid var(--border);border-radius:5px;padding:2px 6px;color:var(--muted)">⌘K</span>
        </button>
        <button onClick="{{ toggleTheme }}" aria-label="Tema" style="width:38px;height:38px;flex:none;border:1px solid var(--border);border-radius:9px;background:var(--card);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s" style-hover="border-color:var(--border-strong)">{{ themeIcon }}</button>
      </header>

      <!-- CONTENT — aquí se inserta el contenido de cada pantalla (los archivos show.X de esta carpeta) -->
      <div style="flex:1;overflow-y:auto">
        <div style="max-width:1180px;margin:0 auto;padding:28px 32px 64px">
          <!-- ►► contenido de la pantalla activa (dashboard.html, fondos.html, … ) ◄◄ -->
        </div>
      </div>
    </main>

  </div>
</div>
