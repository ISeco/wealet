<!-- Wealet — pantalla: confirm-catdelete (Eliminar categoría)
     Referencia de diseño extraída de Wealet.dc.html (solo esta pantalla).
     MODAL CENTRADO (no drawer): overlay align-items:center + justify-content:center, animación wl-pop.
     Lo abre c.del en categorias.html. Botones: Cancelar (closeCatDelete) / Eliminar (confirmCatDelete).
     Sintaxis del prototipo: {{ x }} = interpolación, <sc-if>/<sc-for> = condicional/loop. -->
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'Geist',system-ui,-apple-system,sans-serif;background:#F6F8FB;color:#12294A;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:rgba(100,116,139,.28);border-radius:8px;border:3px solid transparent;background-clip:padding-box}
  :root{
    --bg:#F6F8FB;--card:#FFFFFF;--card-2:#F1F5FA;--tint:#F3F8FE;--border:#E6EBF2;--border-strong:#D6DEEA;
    --text:#12294A;--muted:#64748B;--navy:#12294A;
    --pos:#037940;--pos-bg:#E7F4EC;--neg:#DC2626;--neg-bg:#FBEAEA;--warn:#D97706;--warn-bg:#FBF1E1;--info:#2563EB;--info-bg:#E9F0FE;
    --disp:#16A89A;--disp-bg:#E3F5F2;--res:#2563EB;--res-bg:#E9F0FE;--comp:#D97706;--comp-bg:#FBF1E1;
    --grad:linear-gradient(120deg,#1FA9E0 0%,#16A89A 52%,#6BBF3F 100%);
    --shadow:0 1px 2px rgba(18,41,74,.05),0 1px 3px rgba(18,41,74,.04);
    --shadow-lg:0 8px 30px rgba(18,41,74,.10),0 2px 8px rgba(18,41,74,.06);
    --field:#FFFFFF;
  }
  [data-theme="dark"]{
    --bg:#0F2240;--card:#1A2F52;--card-2:#16294A;--tint:#16314F;--border:rgba(255,255,255,.08);--border-strong:rgba(255,255,255,.15);
    --text:#E6ECF5;--muted:#93A4C0;--navy:#0F2240;
    --pos:#34D17E;--pos-bg:rgba(52,209,126,.13);--neg:#F87171;--neg-bg:rgba(248,113,113,.13);--warn:#FBBF24;--warn-bg:rgba(251,191,36,.13);--info:#60A5FA;--info-bg:rgba(96,165,250,.13);
    --disp:#2DD4BF;--disp-bg:rgba(45,212,191,.13);--res:#60A5FA;--res-bg:rgba(96,165,250,.13);--comp:#FBBF24;--comp-bg:rgba(251,191,36,.13);
    --shadow:0 1px 2px rgba(0,0,0,.24),0 1px 3px rgba(0,0,0,.18);
    --shadow-lg:0 12px 36px rgba(0,0,0,.34),0 3px 10px rgba(0,0,0,.24);
    --field:#16294A;
  }
  @keyframes wl-shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
  @keyframes wl-up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes wl-pop{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:none}}
  @keyframes wl-fade{from{opacity:0}to{opacity:1}}
</style>
<div data-theme="light" style="background:var(--bg);color:var(--text);font-family:'Geist',system-ui,sans-serif;padding:16px">
  <sc-if value="{{ catDeleteOpen }}" hint-placeholder-val="{{ false }}">
  <div onClick="{{ closeCatDelete }}" style="position:fixed;inset:0;z-index:85;background:rgba(15,34,64,.42);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:24px;animation:wl-fade .15s both">
    <div onClick="{{ stop }}" style="width:412px;max-width:94vw;background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-lg);padding:24px;animation:wl-pop .18s both">
      <div style="width:48px;height:48px;border-radius:12px;background:var(--neg-bg);display:flex;align-items:center;justify-content:center;color:var(--neg);margin-bottom:16px"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path></svg></div>
      <div style="font-size:17px;font-weight:600;letter-spacing:-.01em">Eliminar «{{ catDeleteName }}»</div>
      <div style="font-size:13.5px;color:var(--muted);line-height:1.55;margin-top:8px">Esta categoría se quitará de tu lista. Tus movimientos <b style="color:var(--text);font-weight:600">no se borran</b>: quedarán sin categoría hasta que les asignes otra.</div>
      <div style="display:flex;gap:10px;margin-top:22px">
        <button onClick="{{ closeCatDelete }}" style="flex:1;height:42px;border:1px solid var(--border-strong);border-radius:9px;background:var(--card);color:var(--text);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer">Cancelar</button>
        <button onClick="{{ confirmCatDelete }}" style="flex:1;height:42px;border:none;border-radius:9px;background:var(--neg);color:#fff;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer">Eliminar</button>
      </div>
    </div>
  </div>
  </sc-if>
</div>
