name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wealet
          POSTGRES_PASSWORD: wealet
          POSTGRES_DB: wealet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wealet -d wealet_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: wealet
      DB_PASSWORD: wealet
      DB_DATABASE: wealet_test
      JWT_SECRET: ci-test-secret
      PASSWORD_PEPPER: ci-test-pepper
      BREVO_API_KEY: ci-test-brevo-key
      BREVO_FROM_EMAIL: noreply@domain.com
      FRONTEND_URL: http://localhost:5173

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm type-check

      - run: pnpm test

      - run: pnpm --filter web test

      - run: pnpm --filter api test:e2e

      - run: pnpm --filter api build

      - run: pnpm --filter web build
