databases:
  - name: wealet-db
    plan: free
    databaseName: wealet
    user: wealet

services:
  - type: web
    name: wealet-api
    runtime: node
    plan: free
    branch: dev
    buildCommand: corepack enable && corepack prepare pnpm@11.8.0 --activate && pnpm install --frozen-lockfile && pnpm --filter api build
    startCommand: pnpm --filter api migration:run && node apps/api/dist/main.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        fromDatabase:
          name: wealet-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: wealet-db
          property: port
      - key: DB_USERNAME
        fromDatabase:
          name: wealet-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: wealet-db
          property: password
      - key: DB_DATABASE
        fromDatabase:
          name: wealet-db
          property: database
